name: dbt CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dbt-sqlite

    - name: Run dbt debug
      run: dbt debug --profiles-dir .
      working-directory: llm_agent_mcp-main/dbt

    - name: Run dbt build
      run: dbt build --profiles-dir .
      working-directory: llm_agent_mcp-main/dbt

    - name: Run dbt source freshness
      run: dbt source freshness --profiles-dir . || echo "Freshness check skipped or failed"
      working-directory: llm_agent_mcp-main/dbt
